# Coolify-safe compose file (no host port binding).
#
# On Coolify: this file is auto-detected. Traefik routes your domain directly
# to the container's port 3000 — no host port is published, so it can never
# clash with ports already used on the server. In the Coolify service
# settings, set the application's port/domain mapping to 3000.
#
# For standalone testing on any Docker host (publishes a host port):
#   docker compose -f docker-compose.yml -f docker-compose.standalone.yml up -d --build
#   → http://<server-ip>:8080   (override with APP_PORT=xxxx)
#
# The SQLite question bank persists in the named volume `bpsc-data` (/data).

services:
  app:
    build: .
    image: bpsc-ai-os:latest
    expose:
      - "3000"
    environment:
      - PORT=3000
      - DATA_DIR=/data
    volumes:
      - bpsc-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  bpsc-data:
