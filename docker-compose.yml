# One-command deploy for a KVM VPS (or any Docker host).
#
#   docker compose up -d --build
#
# Then open http://<server-ip>:8080
#
# The single container serves BOTH the app and the API. The SQLite question
# bank is persisted in the named volume `bpsc-data` (mounted at /data), so it
# survives restarts and redeploys.
#
# For a public URL (PWA install + offline + voice need HTTPS), put this behind
# a TLS-terminating reverse proxy — e.g. Coolify/Traefik. See docs/deployment.md.

services:
  app:
    build: .
    image: bpsc-ai-os:latest
    container_name: bpsc-ai-os
    ports:
      - "8080:3000"
    environment:
      - PORT=3000
      - DATA_DIR=/data
    volumes:
      - bpsc-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  bpsc-data:
