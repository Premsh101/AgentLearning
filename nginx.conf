server {
    listen       80;
    listen  [::]:80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # gzip for faster loads on low-bandwidth connections (common for the audience)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    # SPA fallback — any unknown path serves index.html (also covers PWA navigateFallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the service worker or the app shell, so updates roll out immediately
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        types { } default_type application/manifest+json;
    }

    # Content-hashed assets can be cached aggressively and immutably
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
